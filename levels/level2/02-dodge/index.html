<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2-02 躲避障碍物</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        #gameCanvas {
            border: 3px solid #FF6B6B;
            background: #16213e;
            margin: 20px auto;
            display: block;
        }
        .score-board {
            font-size: 20px;
            margin: 10px;
        }
        .controls {
            margin: 20px;
        }
        .controls button {
            font-size: 18px;
            padding: 12px 20px;
            margin: 5px;
            cursor: pointer;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 8px;
        }
        .task {
            background: #0f3460;
            padding: 15px;
            margin: 20px auto;
            max-width: 600px;
            border-radius: 8px;
            text-align: left;
        }
        .key {
            display: inline-block;
            background: #eee;
            color: #333;
            border: 2px solid #999;
            border-radius: 5px;
            padding: 5px 10px;
            margin: 2px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🚀 L2-02 躲避障碍物！</h1>
    
    <div class="score-board">
        得分：<span id="score">0</span> | 生命：<span id="lives">❤️❤️❤️</span>
    </div>
    
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div class="controls">
        <button id="startBtn" onclick="startGame()">🎮 开始游戏</button>
        <p>用 <span class="key">←</span> <span class="key">→</span> 控制飞船躲避陨石</p>
        <p>坚持越久得分越高！</p>
    </div>
    
    <div class="task">
        <h3>📝 今日任务</h3>
        <p>1. 控制飞船左右移动躲避陨石</p>
        <p>2. 收集绿色能量球加分</p>
        <p>3. 挑战：得到 1000 分！</p>
        
        <h3>💡 新知识</h3>
        <p><strong>数组</strong>：存储多个陨石对象，统一管理。</p>
        <p><strong>对象</strong>：每个陨石有位置、速度、大小等属性。</p>
        <p><strong>随机生成</strong>：陨石从顶部随机位置落下。</p>
    </div>

    <script>
        let canvas = document.getElementById("gameCanvas");
        let ctx = canvas.getContext("2d");
        
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let frameCount = 0;
        
        // 玩家飞船
        let player = {
            x: 180,
            y: 520,
            width: 40,
            height: 40,
            speed: 6
        };
        
        // 陨石数组
        let meteors = [];
        
        // 能量球数组
        let powerups = [];
        
        // 按键状态
        let leftPressed = false;
        let rightPressed = false;
        
        // 初始化游戏
        function initGame() {
            meteors = [];
            powerups = [];
            score = 0;
            lives = 3;
            frameCount = 0;
            player.x = 180;
            document.getElementById("score").innerText = score;
            document.getElementById("lives").innerText = "❤️❤️❤️";
        }
        
        // 画玩家
        function drawPlayer() {
            ctx.fillStyle = "#4CAF50";
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            // 火焰效果
            ctx.fillStyle = "#FF9800";
            ctx.beginPath();
            ctx.moveTo(player.x + 10, player.y + player.height);
            ctx.lineTo(player.x + 20, player.y + player.height + 15);
            ctx.lineTo(player.x + 30, player.y + player.height);
            ctx.closePath();
            ctx.fill();
        }
        
        // 生成陨石
        function spawnMeteor() {
            let size = Math.random() * 30 + 20;
            meteors.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: Math.random() * 3 + 2
            });
        }
        
        // 生成能量球
        function spawnPowerup() {
            powerups.push({
                x: Math.random() * (canvas.width - 20),
                y: -20,
                width: 20,
                height: 20,
                speed: 3
            });
        }
        
        // 画陨石
        function drawMeteors() {
            ctx.fillStyle = "#8B4513";
            for (let i = 0; i < meteors.length; i++) {
                let m = meteors[i];
                ctx.beginPath();
                ctx.arc(m.x + m.width / 2, m.y + m.height / 2, m.width / 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 陨石纹理
                ctx.fillStyle = "#A0522D";
                ctx.beginPath();
                ctx.arc(m.x + m.width / 3, m.y + m.height / 3, m.width / 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#8B4513";
            }
        }
        
        // 画能量球
        function drawPowerups() {
            ctx.fillStyle = "#00FF00";
            for (let i = 0; i < powerups.length; i++) {
                let p = powerups[i];
                ctx.beginPath();
                ctx.arc(p.x + p.width / 2, p.y + p.height / 2, p.width / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 更新陨石位置
        function updateMeteors() {
            for (let i = meteors.length - 1; i >= 0; i--) {
                let m = meteors[i];
                m.y += m.speed;
                
                // 超出底部，删除
                if (m.y > canvas.height) {
                    meteors.splice(i, 1);
                    score += 10;
                    document.getElementById("score").innerText = score;
                }
                
                // 碰撞检测
                if (collision(player, m)) {
                    meteors.splice(i, 1);
                    lives--;
                    document.getElementById("lives").innerText = "❤️".repeat(lives);
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }
        }
        
        // 更新能量球
        function updatePowerups() {
            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i];
                p.y += p.speed;
                
                if (p.y > canvas.height) {
                    powerups.splice(i, 1);
                }
                
                if (collision(player, p)) {
                    powerups.splice(i, 1);
                    score += 50;
                    document.getElementById("score").innerText = score;
                }
            }
        }
        
        // 碰撞检测（矩形）
        function collision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // 移动玩家
        function movePlayer() {
            if (leftPressed && player.x > 0) {
                player.x -= player.speed;
            }
            if (rightPressed && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
        }
        
        // 游戏主循环
        function gameLoop() {
            if (!gameRunning) return;
            
            // 清空画布
            ctx.fillStyle = "#16213e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 星空背景
            ctx.fillStyle = "#FFF";
            for (let i = 0; i < 50; i++) {
                let x = (i * 37) % canvas.width;
                let y = (i * 41 + frameCount / 2) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }
            
            drawPlayer();
            drawMeteors();
            drawPowerups();
            updateMeteors();
            updatePowerups();
            movePlayer();
            
            // 每 60 帧生成一个陨石
            frameCount++;
            if (frameCount % 60 === 0) {
                spawnMeteor();
            }
            
            // 每 180 帧生成一个能量球
            if (frameCount % 180 === 0) {
                spawnPowerup();
            }
            
            // 每秒加 10 分
            if (frameCount % 60 === 0) {
                score += 10;
                document.getElementById("score").innerText = score;
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById("startBtn").innerText = "🎮 重新开始";
            alert("😢 游戏结束！得分：" + score);
        }
        
        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            document.getElementById("startBtn").innerText = "🎮 游戏中...";
            gameLoop();
        }
        
        // 键盘控制
        document.addEventListener("keydown", function(e) {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
                leftPressed = true;
            } else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
                rightPressed = true;
            }
        });
        
        document.addEventListener("keyup", function(e) {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
                leftPressed = false;
            } else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
                rightPressed = false;
            }
        });
        
        // 初始画面
        ctx.fillStyle = "#16213e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "20px Arial";
        ctx.fillText("点击开始游戏", 140, 300);
    </script>
</body>
</html>
