<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2-01 打砖块</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        #gameCanvas {
            border: 3px solid #4CAF50;
            background: #16213e;
            margin: 20px auto;
            display: block;
        }
        .score-board {
            font-size: 20px;
            margin: 10px;
        }
        .controls {
            margin: 20px;
        }
        .controls button {
            font-size: 18px;
            padding: 12px 20px;
            margin: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
        }
        .task {
            background: #0f3460;
            padding: 15px;
            margin: 20px auto;
            max-width: 600px;
            border-radius: 8px;
            text-align: left;
        }
        .key {
            display: inline-block;
            background: #eee;
            color: #333;
            border: 2px solid #999;
            border-radius: 5px;
            padding: 5px 10px;
            margin: 2px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🧱 L2-01 打砖块！</h1>
    
    <div class="score-board">
        得分：<span id="score">0</span> | 生命：<span id="lives">❤️❤️❤️</span>
    </div>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <div class="controls">
        <button id="startBtn" onclick="startGame()">🎮 开始游戏</button>
        <p>用 <span class="key">←</span> <span class="key">→</span> 或 <span class="key">A</span> <span class="key">D</span> 移动挡板</p>
        <p>用球打掉所有砖块，不要让球掉下去！</p>
    </div>
    
    <div class="task">
        <h3>📝 今日任务</h3>
        <p>1. 控制挡板反弹小球</p>
        <p>2. 打掉所有彩色砖块</p>
        <p>3. 挑战：得到 500 分！</p>
        
        <h3>💡 新知识</h3>
        <p><strong>状态管理</strong>：游戏有开始、进行中、暂停、结束等状态。</p>
        <p><strong>计分系统</strong>：不同颜色的砖块分值不同，记录总分。</p>
        <p><strong>物理反弹</strong>：球碰到墙壁和挡板会改变方向。</p>
    </div>

    <script>
        let canvas = document.getElementById("gameCanvas");
        let ctx = canvas.getContext("2d");
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        
        // 挡板
        let paddle = {
            x: 250,
            y: 380,
            width: 100,
            height: 10,
            speed: 8
        };
        
        // 球
        let ball = {
            x: 300,
            y: 300,
            radius: 8,
            dx: 4,
            dy: -4
        };
        
        // 砖块
        let brickRowCount = 5;
        let brickColumnCount = 9;
        let brickWidth = 60;
        let brickHeight = 20;
        let brickPadding = 10;
        let brickOffsetTop = 30;
        let brickOffsetLeft = 5;
        
        // 砖块颜色和分值
        let brickColors = ["#FF5252", "#FF9800", "#FFEB3B", "#4CAF50", "#2196F3"];
        let brickScores = [50, 40, 30, 20, 10];
        
        let bricks = [];
        
        // 初始化砖块
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { 
                        x: 0, 
                        y: 0, 
                        status: 1,  // 1=完整，0=已打破
                        color: brickColors[r],
                        score: brickScores[r]
                    };
                }
            }
        }
        
        // 画挡板
        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 5);
            ctx.fillStyle = "#4CAF50";
            ctx.fill();
            ctx.closePath();
        }
        
        // 画球
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#FFFFFF";
            ctx.fill();
            ctx.closePath();
        }
        
        // 画砖块
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        let brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 3);
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }
        
        // 碰撞检测
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        if (ball.x > b.x && ball.x < b.x + brickWidth && 
                            ball.y > b.y && ball.y < b.y + brickHeight) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            score += b.score;
                            document.getElementById("score").innerText = score;
                            
                            // 检查是否通关
                            if (score >= 500) {
                                gameOver(true);
                            }
                        }
                    }
                }
            }
        }
        
        // 移动挡板
        function movePaddle() {
            if (rightPressed && paddle.x < canvas.width - paddle.width) {
                paddle.x += paddle.speed;
            } else if (leftPressed && paddle.x > 0) {
                paddle.x -= paddle.speed;
            }
        }
        
        // 更新球的位置
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // 左右墙壁反弹
            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
                ball.dx = -ball.dx;
            }
            
            // 顶部反弹
            if (ball.y + ball.dy < ball.radius) {
                ball.dy = -ball.dy;
            }
            
            // 底部 - 检查是否碰到挡板
            if (ball.y + ball.dy > canvas.height - ball.radius - paddle.height) {
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    // 根据击中挡板的位置改变角度
                    let hitPoint = (ball.x - paddle.x) / paddle.width;
                    ball.dx = 8 * (hitPoint - 0.5);
                    ball.dy = -Math.abs(ball.dy);
                } else if (ball.y + ball.dy > canvas.height - ball.radius) {
                    // 球掉下去了
                    lives--;
                    document.getElementById("lives").innerText = "❤️".repeat(lives);
                    if (lives <= 0) {
                        gameOver(false);
                    } else {
                        resetBall();
                    }
                }
            }
        }
        
        // 重置球
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -4;
        }
        
        // 游戏主循环
        function draw() {
            if (!gameRunning) return;
            
            // 清空画布
            ctx.fillStyle = "#16213e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();
            updateBall();
            movePaddle();
            
            requestAnimationFrame(draw);
        }
        
        // 游戏结束
        function gameOver(win) {
            gameRunning = false;
            document.getElementById("startBtn").innerText = "🎮 重新开始";
            if (win) {
                alert("🎉 恭喜你通关啦！得分：" + score);
            } else {
                alert("😢 游戏结束！得分：" + score);
            }
        }
        
        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            score = 0;
            lives = 3;
            document.getElementById("score").innerText = score;
            document.getElementById("lives").innerText = "❤️❤️❤️";
            
            initBricks();
            resetBall();
            paddle.x = 250;
            
            gameRunning = true;
            document.getElementById("startBtn").innerText = "🎮 游戏中...";
            draw();
        }
        
        // 键盘控制
        let leftPressed = false;
        let rightPressed = false;
        
        document.addEventListener("keydown", function(e) {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
                leftPressed = true;
            } else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
                rightPressed = true;
            }
        });
        
        document.addEventListener("keyup", function(e) {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
                leftPressed = false;
            } else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
                rightPressed = false;
            }
        });
        
        // 初始画面
        ctx.fillStyle = "#16213e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "20px Arial";
        ctx.fillText("点击开始游戏", 240, 200);
    </script>
</body>
</html>
