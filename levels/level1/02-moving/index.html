<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L1-02 让角色动起来</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f8ff;
        }
        #gameArea {
            width: 600px;
            height: 400px;
            border: 3px solid #333;
            margin: 20px auto;
            background: #87CEEB;
            position: relative;
            overflow: hidden;
        }
        #player {
            width: 40px;
            height: 40px;
            background: #FF6B6B;
            border-radius: 50%;
            position: absolute;
            left: 280px;
            top: 180px;
            font-size: 30px;
            text-align: center;
            line-height: 40px;
            transition: all 0.1s;
        }
        .controls {
            margin: 20px;
        }
        .controls button {
            font-size: 20px;
            padding: 15px 25px;
            margin: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
        }
        .position {
            font-size: 18px;
            color: #333;
            margin: 10px;
        }
        .task {
            background: #fff3cd;
            padding: 15px;
            margin: 20px auto;
            max-width: 600px;
            border-radius: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🎮 L1-02 让角色动起来！</h1>
    
    <div class="position">
        位置：X = <span id="posX">280</span>, Y = <span id="posY">180</span>
    </div>
    
    <div id="gameArea">
        <div id="player">😀</div>
    </div>
    
    <div class="controls">
        <button onclick="moveUp()">⬆️ 上</button><br>
        <button onclick="moveLeft()">⬅️ 左</button>
        <button onclick="moveDown()">⬇️ 下</button>
        <button onclick="moveRight()">➡️ 右</button>
    </div>
    
    <div class="task">
        <h3>📝 今日任务</h3>
        <p>1. 点击方向按钮，让笑脸小人移动</p>
        <p>2. 观察位置数字的变化</p>
        <p>3. 挑战：把小人移到左上角 (0, 0)！</p>
        
        <h3>💡 小知识</h3>
        <p><strong>坐标系统</strong>：X 是左右方向，Y 是上下方向。</p>
        <p><strong>变量</strong>：就像一个盒子，可以存储数字。</p>
        <p>每次移动，我们都在改变小人的 X 或 Y 坐标。</p>
    </div>

    <script>
        // 玩家位置变量
        let playerX = 280;
        let playerY = 180;
        let step = 20;  // 每次移动的步数
        
        // 获取玩家元素
        let player = document.getElementById("player");
        
        // 更新位置显示
        function updatePosition() {
            player.style.left = playerX + "px";
            player.style.top = playerY + "px";
            document.getElementById("posX").innerText = playerX;
            document.getElementById("posY").innerText = playerY;
        }
        
        // 向上移动
        function moveUp() {
            if (playerY > 0) {
                playerY = playerY - step;
                updatePosition();
            }
        }
        
        // 向下移动
        function moveDown() {
            if (playerY < 360) {
                playerY = playerY + step;
                updatePosition();
            }
        }
        
        // 向左移动
        function moveLeft() {
            if (playerX > 0) {
                playerX = playerX - step;
                updatePosition();
            }
        }
        
        // 向右移动
        function moveRight() {
            if (playerX < 560) {
                playerX = playerX + step;
                updatePosition();
            }
        }
        
        // 添加键盘控制
        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowUp") moveUp();
            if (event.key === "ArrowDown") moveDown();
            if (event.key === "ArrowLeft") moveLeft();
            if (event.key === "ArrowRight") moveRight();
        });
    </script>
</body>
</html>
