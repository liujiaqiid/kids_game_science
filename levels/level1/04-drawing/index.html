<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L1-04 画画小能手</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f8ff;
        }
        #canvas {
            border: 3px solid #333;
            background: white;
            cursor: crosshair;
            margin: 10px auto;
            display: block;
        }
        .controls {
            margin: 20px;
        }
        .controls button {
            font-size: 16px;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .color-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #333;
        }
        .task {
            background: #fff3cd;
            padding: 15px;
            margin: 20px auto;
            max-width: 600px;
            border-radius: 8px;
            text-align: left;
        }
        .size-slider {
            width: 200px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <h1>🎨 L1-04 画画小能手！</h1>
    
    <canvas id="canvas" width="600" height="400"></canvas>
    
    <div class="controls">
        <p>选择颜色：</p>
        <button class="color-btn" style="background: #000000;" onclick="setColor('#000000')"></button>
        <button class="color-btn" style="background: #FF0000;" onclick="setColor('#FF0000')"></button>
        <button class="color-btn" style="background: #00FF00;" onclick="setColor('#00FF00')"></button>
        <button class="color-btn" style="background: #0000FF;" onclick="setColor('#0000FF')"></button>
        <button class="color-btn" style="background: #FFFF00;" onclick="setColor('#FFFF00')"></button>
        <button class="color-btn" style="background: #FF69B4;" onclick="setColor('#FF69B4')"></button>
        <button class="color-btn" style="background: #FFA500;" onclick="setColor('#FFA500')"></button>
        <button class="color-btn" style="background: #8B4513;" onclick="setColor('#8B4513')"></button>
        
        <p>
            画笔大小：
            <input type="range" class="size-slider" min="1" max="20" value="5" id="sizeSlider" oninput="setSize(this.value)">
            <span id="sizeValue">5</span>px
        </p>
        
        <button onclick="clearCanvas()" style="background: #f44336; color: white;">🗑️ 清空画布</button>
        <button onclick="eraser()" style="background: #9e9e9e; color: white;">🧹 橡皮擦</button>
    </div>
    
    <div class="task">
        <h3>📝 今日任务</h3>
        <p>1. 选择喜欢的颜色，在画布上画画</p>
        <p>2. 尝试调整画笔大小</p>
        <p>3. 挑战：画一个彩色的太阳和草地！</p>
        
        <h3>💡 小知识</h3>
        <p><strong>循环</strong>：重复做同样的事情。比如画 100 个点。</p>
        <p><strong>RGB 颜色</strong>：红 (Red)、绿 (Green)、蓝 (Blue) 三种颜色混合出各种颜色。</p>
        <p><strong>Canvas</strong>：HTML5 的画布，可以用代码在上面画画。</p>
    </div>

    <script>
        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");
        
        let isDrawing = false;
        let currentColor = "#000000";
        let currentSize = 5;
        
        canvas.addEventListener("mousedown", startDrawing);
        canvas.addEventListener("mousemove", draw);
        canvas.addEventListener("mouseup", stopDrawing);
        canvas.addEventListener("mouseout", stopDrawing);
        
        function startDrawing(event) {
            isDrawing = true;
            draw(event);
        }
        
        function draw(event) {
            if (!isDrawing) return;
            
            let rect = canvas.getBoundingClientRect();
            let x = event.clientX - rect.left;
            let y = event.clientY - rect.top;
            
            ctx.fillStyle = currentColor;
            ctx.beginPath();
            ctx.arc(x, y, currentSize / 2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function stopDrawing() {
            isDrawing = false;
        }
        
        function setColor(color) {
            currentColor = color;
        }
        
        function setSize(size) {
            currentSize = size;
            document.getElementById("sizeValue").innerText = size;
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        function eraser() {
            currentColor = "#FFFFFF";
        }
        
        // 画彩虹示例
        function drawRainbow() {
            let colors = ["#FF0000", "#FFA500", "#FFFF00", "#00FF00", "#0000FF", "#4B0082", "#8B4513"];
            for (let i = 0; i < colors.length; i++) {
                ctx.fillStyle = colors[i];
                ctx.fillRect(50 + i * 80, 50, 70, 300);
            }
        }
        
        // 按 R 键画彩虹
        document.addEventListener("keydown", function(event) {
            if (event.key === "r" || event.key === "R") {
                drawRainbow();
            }
        });
    </script>
</body>
</html>
